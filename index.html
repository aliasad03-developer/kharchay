function SimpleBar({ data, dataKeyX, dataKeyY, dataKeyY2, fill, fill2, height = 200, showK }) {
  if (!data || !data.length) return null;
  const maxVal = Math.max(...data.map(d => Math.max(Number(d[dataKeyY])||0, Number(d[dataKeyY2])||0)));
  const fk = (v) => showK ? Math.round(v/1000) : v.toLocaleString();
  return (
    <div>
      {showK && <div style={{textAlign:"right",fontSize:9,color:"#94a3b8",marginBottom:4}}>PKR '000</div>}
      <div style={{height,display:"flex",alignItems:"flex-end",gap:4,padding:"0 4px"}}>
        {data.map((d, i) => {
          const v1 = Number(d[dataKeyY]) || 0;
          const v2 = dataKeyY2 ? (Number(d[dataKeyY2]) || 0) : 0;
          const h1 = maxVal > 0 ? (v1 / maxVal) * (height - 46) : 0;
          const h2 = maxVal > 0 ? (v2 / maxVal) * (height - 46) : 0;
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:0}}>
              <div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",justifyContent:"center",flex:1}}>
                <div style={{width:dataKeyY2?"45%":"70%",display:"flex",flexDirection:"column",alignItems:"center"}}>
                  {v1>0 && <div style={{fontSize:7,color:fill||"#059669",fontWeight:700,marginBottom:1}}>{fk(v1)}</div>}
                  <div style={{width:"100%",height:h1,background:fill||"#059669",borderRadius:"4px 4px 0 0",minHeight:v1>0?4:0,transition:"height 0.4s"}} title={dataKeyY+": Rs "+v1.toLocaleString()} />
                </div>
                {dataKeyY2 && <div style={{width:"45%",display:"flex",flexDirection:"column",alignItems:"center"}}>
                  {v2>0 && <div style={{fontSize:7,color:fill2||"#dc2626",fontWeight:700,marginBottom:1}}>{fk(v2)}</div>}
                  <div style={{width:"100%",height:h2,background:fill2||"#dc2626",borderRadius:"4px 4px 0 0",minHeight:v2>0?4:0,transition:"height 0.4s"}} title={dataKeyY2+": Rs "+v2.toLocaleString()} />
                </div>}
              </div>
              <div style={{fontSize:9,color:"#64748b",textAlign:"center",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{d[dataKeyX]}</div>
            </div>
          );
        })}
      </div>
      {showK && dataKeyY2 && <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:6}}>

      </div>}
    </div>
  );
}

function SimplePie({ data, height = 200 }) {
  if (!data || !data.length) return null;
  const total = data.reduce((s, d) => s + (Number(d.value) || 0), 0);
  if (total === 0) return null;
  const colors = ["#059669","#2563eb","#d97706","#dc2626","#7c3aed","#db2777","#0891b2","#65a30d","#ea580c","#4f46e5"];
  let cumAngle = 0;
  const radius = 80, cx = 100, cy = 100, inner = 50;
  const arcs = data.map((d, i) => {
    const angle = (d.value / total) * 360;
    const startAngle = cumAngle;
    cumAngle += angle;
    const endAngle = cumAngle;
    const startRad = (startAngle - 90) * Math.PI / 180;
    const endRad = (endAngle - 90) * Math.PI / 180;
    const largeArc = angle > 180 ? 1 : 0;
    const x1o = cx + radius * Math.cos(startRad), y1o = cy + radius * Math.sin(startRad);
    const x2o = cx + radius * Math.cos(endRad), y2o = cy + radius * Math.sin(endRad);
    const x1i = cx + inner * Math.cos(endRad), y1i = cy + inner * Math.sin(endRad);
    const x2i = cx + inner * Math.cos(startRad), y2i = cy + inner * Math.sin(startRad);
    const path = `M${x1o},${y1o} A${radius},${radius} 0 ${largeArc},1 ${x2o},${y2o} L${x1i},${y1i} A${inner},${inner} 0 ${largeArc},0 ${x2i},${y2i} Z`;
    const midAngle = ((startAngle + endAngle) / 2 - 90) * Math.PI / 180;
    const lx = cx + (radius+14) * Math.cos(midAngle);
    const ly = cy + (radius+14) * Math.sin(midAngle);
    return { path, color: colors[i % colors.length], name: d.name, value: d.value, pct: ((d.value/total)*100).toFixed(1), lx, ly, angle };
  });
  return (
    <div style={{textAlign:"center"}}>
      <svg viewBox="-10 -10 220 220" width={height} height={height}>
        {arcs.map((a, i) => <path key={i} d={a.path} fill={a.color} stroke="#fff" strokeWidth="2"><title>{a.name}: Rs {a.value.toLocaleString()} ({a.pct}%)</title></path>)}

      </svg>
    </div>
  );
}

// ── CSV Utilities ─────────────────────────────────────────
function exportCSV(data, filename, headers) {
  if (!data.length) return;
  const keys = headers ? headers.map(h=>h.key) : Object.keys(data[0]);
  const labels = headers ? headers.map(h=>h.label) : keys;
  const csv = [labels.join(","), ...data.map(r => keys.map(k => {
    let v = r[k] ?? "";
    if (typeof v === "string" && (v.includes(",") || v.includes('"'))) v = `"${v.replace(/"/g,'""')}"`;
    return v;
  }).join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (const ch of line) { if (ch === '"') inQ = !inQ; else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; } else cur += ch; }
    vals.push(cur.trim());
    const obj = {}; headers.forEach((h, i) => { obj[h] = vals[i] || ""; }); obj.id = uid();
    return obj;
  });
}

  const expenseByCategory = useMemo(() => {
    const m = {};
    expenses.forEach(e => { m[e.category] = (m[e.category] || 0) + Number(e.amount); });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [expenses]);

  // Monthly aggregation for drill-down
  const expensesByMonth = useMemo(() => {
    const m = {};
    expenses.forEach(e => {
      const d = new Date(e.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label = MONTHS[d.getMonth()] + " " + d.getFullYear();
      if (!m[key]) m[key] = { key, label, total: 0, count: 0 };
      m[key].total += Number(e.amount);
      m[key].count++;
    });
    return Object.values(m).sort((a, b) => b.key.localeCompare(a.key));
  }, [expenses]);

  // Categories within a month
  const categoriesInMonth = useMemo(() => {
    if (!drillMonth) return [];
    const m = {};
    expenses.forEach(e => {
      const d = new Date(e.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (key === drillMonth) {
        if (!m[e.category]) m[e.category] = { category: e.category, total: 0, count: 0 };
        m[e.category].total += Number(e.amount);
        m[e.category].count++;
      }
    });
    return Object.values(m).sort((a, b) => b.total - a.total);
  }, [expenses, drillMonth]);

  // Transactions in month (optionally filtered by category)
  const transactionsInDrill = useMemo(() => {
    return expenses.filter(e => {
      const d = new Date(e.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (key !== drillMonth) return false;
      if (drillCategory && e.category !== drillCategory) return false;
      return true;
    }).sort((a, b) => b.date.localeCompare(a.date));
  }, [expenses, drillMonth, drillCategory]);

  const monthlyChartData = useMemo(() => {
    const m = {};
    [...expenses, ...incomes].forEach(item => {
      const d = new Date(item.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (!m[key]) m[key] = { key, month: MONTHS[d.getMonth()] + " " + d.getFullYear(), income: 0, expense: 0 };
      if (item.source !== undefined) m[key].income += Number(item.amount);
      else m[key].expense += Number(item.amount);
    });
    return Object.values(m).sort((a,b) => a.key.localeCompare(b.key)).slice(-6);
  }, [expenses, incomes]);

  const del = (setter) => (id) => setter(prev => prev.filter(x => x.id !== id));

  const handleImport = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const rows = parseCSV(ev.target.result);
      if (!rows.length) return;
      const target = importTarget;
      if (target === "expense") setExpenses(p => [...p, ...rows.map(r => ({id:uid(),date:r.date||r.Date||today(),description:r.description||r.Description||"",category:r.category||r.Category||"Miscellaneous",amount:Number(r.amount||r.Amount||0),event:r.event||r.Event||""}))]);
      else if (target === "income") setIncomes(p => [...p, ...rows.map(r => ({id:uid(),date:r.date||r.Date||today(),source:r.source||r.Source||"Other",description:r.description||r.Description||"",amount:Number(r.amount||r.Amount||0)}))]);
      else if (target === "invest") setInvestments(p => [...p, ...rows.map(r => ({id:uid(),date:r.date||r.Date||today(),type:r.type||r.Type||"Other",name:r.name||r.Name||"",amount:Number(r.amount||r.Amount||0),notes:r.notes||r.Notes||""}))]);
      else if (target === "ledger") setLedger(p => [...p, ...rows.map(r => ({id:uid(),date:r.date||r.Date||today(),type:(r.type||r.Type||"payable").toLowerCase(),person:r.person||r.Person||"",description:r.description||r.Description||"",amount:Number(r.amount||r.Amount||0),settled:r.settled==="true"||r.Settled==="true"}))]);
      else if (target === "budget") setBudgets(p => [...p, ...rows.map(r => ({id:uid(),category:r.category||r.Category||"Miscellaneous",limit:Number(r.limit||r.Limit||0),month:r.month||r.Month||MONTHS[new Date().getMonth()]+" "+new Date().getFullYear()}))]);
      else if (target === "savings") setSavings(p => [...p, ...rows.map(r => ({id:uid(),date:r.date||r.Date||today(),type:r.type||r.Type||"General Savings",description:r.description||r.Description||"",amount:Number(r.amount||r.Amount||0)}))]);
      setImportTarget(null);
    };
    reader.readAsText(file); e.target.value = "";
  }, [importTarget]);

  const triggerImport = (target) => { setImportTarget(target); setTimeout(() => fileRef.current?.click(), 50); };

  const csvHelp = {
    expense: "Date, Description, Category, Amount, Event",
    income: "Date, Source, Description, Amount",
    invest: "Date, Type, Name, Amount, Notes",
    ledger: "Date, Type, Person, Description, Amount, Settled",
    budget: "Category, Limit, Month",
    savings: "Date, Type, Description, Amount"
  };
  const [showCsvHelp, setShowCsvHelp] = useState(null);

  const ImportBtn = ({target, label}) => (
    <span style={{position:"relative",display:"inline-flex",alignItems:"center",gap:0}}>
      <Btn variant="secondary" onClick={()=>triggerImport(target)}>{label||"↑ Import CSV"}</Btn>
      <button onClick={()=>setShowCsvHelp(showCsvHelp===target?null:target)} style={{marginLeft:-6,padding:"8px 8px",borderRadius:"0 8px 8px 0",border:"1px solid "+T.borderStrong,borderLeft:"none",background:"#fff",cursor:"pointer",fontSize:11,color:T.textSec,fontWeight:600}}>?</button>
      {showCsvHelp===target && <div style={{position:"absolute",top:"100%",left:0,marginTop:6,background:"#fff",borderRadius:10,padding:"14px 16px",boxShadow:"0 8px 30px rgba(0,0,0,0.12)",border:"1px solid rgba(0,0,0,0.08)",zIndex:50,minWidth:260,fontSize:12}}>
        <div style={{fontWeight:600,color:T.heading,marginBottom:8}}>CSV Column Headers</div>
        <div style={{fontFamily:"monospace",background:"#f1f5f9",padding:"10px 12px",borderRadius:6,fontSize:11,color:"#334155",lineHeight:1.8,marginBottom:8}}>{csvHelp[target]}</div>
        <div style={{fontSize:10,color:T.textMuted,lineHeight:1.5}}>First row must be headers. Save as .csv file. Example row:</div>
        <div style={{fontFamily:"monospace",background:"#f1f5f9",padding:"8px 12px",borderRadius:6,fontSize:10,color:"#64748b",marginTop:4}}>
          {target==="expense" && "2026-03-21, Lunch, Food & Dining, 500,"}
          {target==="income" && "2026-03-01, Salary, Monthly pay, 100000"}
          {target==="invest" && "2026-03-15, Gold, 24K Gold, 50000, Monthly"}
          {target==="ledger" && "2026-03-10, payable, Ali, Loan, 5000, false"}
          {target==="budget" && "Food & Dining, 15000, March 2026"}
          {target==="savings" && "2026-03-21, Emergency Fund, Salary saving, 10000"}
        </div>
        <button onClick={()=>setShowCsvHelp(null)} style={{marginTop:8,fontSize:10,color:T.accent,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>Got it ✓</button>
      </div>}
    </span>
  );

  // ══════════════════════════════════════════════════════════
  // ── DASHBOARD with drill-down ─────────────────────────
  // ══════════════════════════════════════════════════════════
  const renderDashboard = () => {
    // ── Level: Overview ──
    if (drillLevel === "overview") return (
      <div>
        <div style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow,marginBottom:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:T.textSec,fontWeight:500}}>📅</span>
          <input type="date" value={dashFrom} onChange={e=>setDashFrom(e.target.value)} style={{padding:"6px 10px",border:"1px solid rgba(0,0,0,0.1)",borderRadius:8,fontSize:12,color:T.text,background:T.inputBg,outline:"none"}} />
          <span style={{fontSize:11,color:T.textMuted}}>to</span>
          <input type="date" value={dashTo} onChange={e=>setDashTo(e.target.value)} style={{padding:"6px 10px",border:"1px solid rgba(0,0,0,0.1)",borderRadius:8,fontSize:12,color:T.text,background:T.inputBg,outline:"none"}} />
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[
              {l:"YTD",f:()=>{setDashFrom(new Date().getFullYear()+"-01-01");setDashTo(today())}},
              {l:"This Month",f:()=>{const n=new Date();setDashFrom(n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-01");setDashTo(today())}},
              {l:"Last Month",f:()=>{const n=new Date();n.setMonth(n.getMonth()-1);const y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,"0");setDashFrom(y+"-"+m+"-01");setDashTo(y+"-"+m+"-"+new Date(y,n.getMonth()+1,0).getDate())}},
              {l:"All Time",f:()=>{setDashFrom("2020-01-01");setDashTo(today())}},
            ].map(q=><button key={q.l} onClick={q.f} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(0,0,0,0.08)",background:"#fff",fontSize:10,cursor:"pointer",color:T.textSec,fontWeight:500}}>{q.l}</button>)}
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
          <StatCard icon="▴" label="Total Income" value={fmt(totalIncome)} accent="#059669" />
          <StatCard icon="▾" label="Total Expenses" value={fmt(totalExpense)} accent="#dc2626" />
          <StatCard icon="◈" label="Net Balance" value={fmt(netBalance)} accent={netBalance>=0?"#059669":"#dc2626"} sub={netBalance>=0?"Surplus":"Deficit"} />
          <StatCard icon="🏦" label="Total Savings" value={fmt(totalSaved)} accent="#2563eb" />
          <StatCard icon="◆" label="Invested" value={fmt(totalInvested)} accent="#7c3aed" />
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
          <StatCard icon="↑" label="Receivable" value={fmt(totalReceivable)} accent="#d97706" sub={`From ${ledger.filter(l=>l.type==="receivable"&&!l.settled).length} people`} />
          <StatCard icon="↓" label="Payable" value={fmt(totalPayable)} accent="#db2777" sub={`To ${ledger.filter(l=>l.type==="payable"&&!l.settled).length} people`} />
        </div>

        {/* Expense Drill-Down Entry Card */}
        {expenses.length > 0 && (
          <div style={{background:"#fff",borderRadius:14,padding:22,border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20,cursor:"pointer",transition:"box-shadow 0.2s"}} onClick={()=>setDrillLevel("months")}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:600,color:T.heading,fontFamily:"'Playfair Display',serif"}}>📊 Expense Breakdown</div>
              <span style={{fontSize:12,color:T.accent,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>Click to drill down →</span>
            </div>
            {/* Category grid preview */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:10}}>
              {expenseByCategory.slice(0, 8).map((c, i) => {
                const m = getCatMeta(c.name);
                return (
                  <div key={c.name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:m.bg,borderRadius:10,border:`1px solid ${m.color}15`}}>
                    <span style={{fontSize:22}}>{m.icon}</span>
                    <div>
                      <div style={{fontSize:11,color:m.color,fontWeight:500,lineHeight:1.2}}>{c.name}</div>
                      <div style={{fontSize:13,fontWeight:700,color:T.heading}}>{fmt(c.value)} <span style={{fontSize:9,color:T.textMuted,fontWeight:500}}>({(()=>{const t=expenseByCategory.reduce((s,x)=>s+x.value,0);return t>0?(c.value/t*100).toFixed(1):0})()}%)</span></div>
                    </div>
                  </div>
                );
              })}
            </div>
            {expenseByCategory.length > 8 && <div style={{fontSize:11,color:T.textMuted,marginTop:8,textAlign:"right"}}>+{expenseByCategory.length - 8} more categories</div>}
          </div>
        )}

        {/* This Month Analytics */}
        <div style={{background:"#fff",borderRadius:14,padding:22,border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <button onClick={()=>shiftFlowMonth(-1)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,fontSize:18,cursor:"pointer",color:T.textSec,padding:"6px 12px",lineHeight:1}}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>📊 {thisMonthLabel} — Money Flow</div>
            </div>
            <button onClick={()=>shiftFlowMonth(1)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,fontSize:18,cursor:"pointer",color:T.textSec,padding:"6px 12px",lineHeight:1}}>›</button>
          </div>
          {(() => {
            const maxVal = Math.max(thisMonthIncome, thisMonthExpense, thisMonthSavings, thisMonthInvest, 1);
            const bars = [
              { label: "Income", value: thisMonthIncome, icon: "▴", color: "#059669", bg: "#ecfdf5" },
              { label: "Expenses", value: thisMonthExpense, icon: "▾", color: "#dc2626", bg: "#fef2f2" },
              { label: "Savings", value: thisMonthSavings, icon: "🏦", color: "#2563eb", bg: "#eff6ff" },
              { label: "Investments", value: thisMonthInvest, icon: "◆", color: "#7c3aed", bg: "#f5f3ff" },
            ];
            const netFlow = thisMonthIncome - thisMonthExpense - thisMonthSavings - thisMonthInvest;
            return (
              <div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {bars.map(b => (
                    <div key={b.label}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{width:32,height:32,borderRadius:8,background:b.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,border:`1px solid ${b.color}20`}}>{b.icon}</span>
                          <span style={{fontSize:13,fontWeight:500,color:T.text}}>{b.label}</span>
                        </div>
                        <span style={{fontSize:16,fontWeight:700,color:b.color,fontFamily:"'Playfair Display',serif"}}>{fmt(b.value)}</span>
                      </div>
                      <div style={{height:10,background:T.surfaceAlt,borderRadius:5,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${maxVal>0?(b.value/maxVal)*100:0}%`,borderRadius:5,background:`linear-gradient(90deg,${b.color},${b.color}cc)`,transition:"width 0.6s ease"}} />
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:16,padding:"12px 16px",borderRadius:10,background:netFlow>=0?"#ecfdf5":"#fef2f2",border:`1px solid ${netFlow>=0?"#05966920":"#dc262620"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:500,color:netFlow>=0?"#059669":"#dc2626"}}>{netFlow>=0?"💪 Net Remaining":"⚠️ Over-spent"}</span>
                  <span style={{fontSize:18,fontWeight:700,color:netFlow>=0?"#059669":"#dc2626",fontFamily:"'Playfair Display',serif"}}>{netFlow>=0?"+":""}{fmt(netFlow)}</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* Charts Row */}
        <div style={{display:"flex",flexWrap:"wrap",gap:20}}>
          {monthlyChartData.length > 0 && (
            <div style={{flex:"1 1 400px",background:"#fff",borderRadius:14,padding:22,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
              <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:16,fontFamily:"'Playfair Display',serif"}}>6-Month Trend</div>
              <SimpleBar data={monthlyChartData} dataKeyX="month" dataKeyY="income" dataKeyY2="expense" fill="#059669" fill2="#dc2626" height={200} showK />
            </div>
          )}
        </div>
        {!expenses.length && !incomes.length && <EmptyState icon="📊" text="Start by adding income and expenses to see your financial overview" />}
      </div>
    );

    // ── Level: Monthly Breakdown ──
    if (drillLevel === "months") return (
      <div>
        <Breadcrumb items={[
          { label: "Dashboard", onClick: resetDrill },
          { label: "Expenses by Month" }
        ]} />
        <div style={{fontSize:15,fontWeight:600,color:T.heading,marginBottom:16,fontFamily:"'Playfair Display',serif"}}>📅 Monthly Expense Breakdown</div>
        {expensesByMonth.length ? (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {expensesByMonth.map(m => (
              <div key={m.key} onClick={()=>{setDrillMonth(m.key);setDrillLevel("categories")}} style={{background:"#fff",borderRadius:12,padding:"18px 22px",border:`1px solid ${T.border}`,boxShadow:T.shadow,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"box-shadow 0.2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#fef2f2,#fee2e2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📅</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:600,color:T.heading}}>{m.label}</div>
                    <div style={{fontSize:12,color:T.textMuted}}>{m.count} transaction{m.count!==1?"s":""}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:18,fontWeight:700,color:"#dc2626",fontFamily:"'Playfair Display',serif"}}>{fmt(m.total)}</span>
                  <span style={{color:T.textMuted,fontSize:18}}>›</span>
                </div>
              </div>
            ))}
          </div>
        ) : <EmptyState icon="📅" text="No expense data yet" />}
      </div>
    );

    // ── Level: Categories within a Month ──
    if (drillLevel === "categories") {
      const monthLabel = drillMonth ? MONTHS[parseInt(drillMonth.split("-")[1])-1] + " " + drillMonth.split("-")[0] : "";
      const monthTotal = categoriesInMonth.reduce((s, c) => s + c.total, 0);
      const chartData = categoriesInMonth.map(c => ({ name: c.category, value: c.total }));

      return (
        <div>
          <Breadcrumb items={[
            { label: "Dashboard", onClick: resetDrill },
            { label: "Expenses by Month", onClick: ()=>{setDrillLevel("months");setDrillMonth(null);setDrillCategory(null)} },
            { label: monthLabel }
          ]} />
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
            <div style={{fontSize:15,fontWeight:600,color:T.heading,fontFamily:"'Playfair Display',serif"}}>🏷️ {monthLabel} — Categories</div>
            <Btn variant="secondary" style={{fontSize:12,padding:"7px 14px"}} onClick={()=>{setDrillCategory(null);setDrillLevel("transactions")}}>View All Transactions</Btn>
          </div>
          <div style={{fontSize:22,fontWeight:700,color:"#dc2626",fontFamily:"'Playfair Display',serif",marginBottom:20}}>Total: {fmt(monthTotal)}</div>

          {/* Pie chart for month */}
          {chartData.length > 0 && (
            <div style={{background:"#fff",borderRadius:14,padding:22,border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
              <SimplePie data={chartData} height={160} />
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px",marginTop:10,justifyContent:"center"}}>
              {chartData.map((cat,i)=>{const m=getCatMeta(cat.name);const total=chartData.reduce((s,d)=>s+d.value,0);return <div key={cat.name} style={{fontSize:10,color:"#475569",display:"flex",alignItems:"center",gap:3}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:["#059669","#2563eb","#d97706","#dc2626","#7c3aed","#db2777","#0891b2","#65a30d","#ea580c","#4f46e5"][i%10],display:"inline-block"}} />{m.icon} {cat.name} ({total>0?((cat.value/total)*100).toFixed(1):0}%)
              </div>;})}
            </div>
            </div>
          )}

          {/* Category cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:12}}>
            {categoriesInMonth.map(c => {
              const m = getCatMeta(c.category);
              const pct = monthTotal > 0 ? ((c.total / monthTotal) * 100).toFixed(1) : 0;
              return (
                <div key={c.category} onClick={()=>{setDrillCategory(c.category);setDrillLevel("transactions")}} style={{background:"#fff",borderRadius:12,padding:18,border:`1px solid ${T.border}`,boxShadow:T.shadow,cursor:"pointer",transition:"box-shadow 0.2s,transform 0.15s",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,height:4,background:T.surfaceAlt}}>
                    <div style={{height:"100%",width:`${pct}%`,background:m.color,borderRadius:2,transition:"width 0.5s"}} />
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <div style={{width:42,height:42,borderRadius:10,background:m.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:`1px solid ${m.color}20`}}>{m.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:T.heading}}>{c.category}</div>
                      <div style={{fontSize:11,color:T.textMuted}}>{c.count} item{c.count!==1?"s":""} · {pct}%</div>
                    </div>
                  </div>
                  <div style={{fontSize:18,fontWeight:700,color:m.color,fontFamily:"'Playfair Display',serif"}}>{fmt(c.total)}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Level: Transactions ──
    if (drillLevel === "transactions") {
      const monthLabel = drillMonth ? MONTHS[parseInt(drillMonth.split("-")[1])-1] + " " + drillMonth.split("-")[0] : "";
      return (
        <div>
          <Breadcrumb items={[
            { label: "Dashboard", onClick: resetDrill },
            { label: "Expenses by Month", onClick: ()=>{setDrillLevel("months");setDrillMonth(null);setDrillCategory(null)} },
            { label: monthLabel, onClick: ()=>{setDrillLevel("categories");setDrillCategory(null)} },
            { label: drillCategory || "All Transactions" }
          ]} />
          <div style={{fontSize:15,fontWeight:600,color:T.heading,marginBottom:16,fontFamily:"'Playfair Display',serif"}}>
            {drillCategory ? `${getCatMeta(drillCategory).icon} ${drillCategory}` : "📋 All Transactions"} — {monthLabel}
          </div>
          <div style={{fontSize:18,fontWeight:700,color:"#dc2626",marginBottom:18,fontFamily:"'Playfair Display',serif"}}>
            Total: {fmt(transactionsInDrill.reduce((s,e)=>s+Number(e.amount),0))} · {transactionsInDrill.length} transaction{transactionsInDrill.length!==1?"s":""}
          </div>
          {transactionsInDrill.length ? (
            <Table columns={[
              {key:"date",label:"Date"},
              {key:"description",label:"Description"},
              {key:"category",label:"Category",render:r=><CatBadge category={r.category} />},
              {key:"event",label:"Event",render:r=><EventBadge event={getEvent(r.event)} />},
              {key:"amount",label:"Amount",render:r=><span style={{color:"#dc2626",fontWeight:600}}>{fmt(r.amount)}</span>}
            ]} data={transactionsInDrill} />
          ) : <EmptyState icon="📋" text="No transactions found" />}
        </div>
      );
    }

    return null;
  };

  // ══════════════════════════════════════════════════════════
  // ── EXPENSES TAB ──────────────────────────────────────

  const ExpenseForm = () => {
    const [f, setF] = useState({ date: today(), description: "", category: "", amount: "", event: "" });
    return (
      <div>
        <Input label="Date" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />

        <Input label="Amount (₨)" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" />
        {/* Event Linker */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:8,letterSpacing:"0.03em",fontWeight:500}}>Link to Event / Occasion <span style={{color:T.textMuted,fontWeight:400}}>(optional)</span></label>
          {events.length > 0 ? (
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              <button type="button" onClick={()=>setF({...f,event:""})} style={{padding:"8px 14px",borderRadius:10,border:`2px solid ${!f.event?T.accent:T.border}`,background:!f.event?"#ecfdf5":"#fff",fontSize:12,cursor:"pointer",color:!f.event?T.accent:T.textSec,fontWeight:!f.event?600:400,transition:"all 0.15s"}}>None</button>
              {events.map(ev => {
                const sel = f.event === ev.id;
                return (
                  <button key={ev.id} type="button" onClick={()=>setF({...f,event:ev.id})} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,border:`2px solid ${sel?"#7c3aed":T.border}`,background:sel?"#f5f3ff":"#fff",cursor:"pointer",fontSize:12,color:sel?"#7c3aed":T.text,fontWeight:sel?600:400,transition:"all 0.15s"}}>
                    <span style={{fontSize:16}}>{ev.icon}</span>{ev.name}
                  </button>
                );
              })}
              <button type="button" onClick={()=>setModal("event")} style={{padding:"8px 14px",borderRadius:10,border:`2px dashed ${T.border}`,background:"transparent",fontSize:12,cursor:"pointer",color:T.accent,fontWeight:500}}>+ New Event</button>
            </div>
          ) : (
            <button type="button" onClick={()=>setModal("event")} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 18px",borderRadius:10,border:`2px dashed ${T.border}`,background:"#fff",cursor:"pointer",width:"100%",fontSize:13,color:T.textSec}}>
              <span style={{fontSize:20}}>🎯</span>

        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.amount&&f.category){setExpenses(p=>[{id:uid(),...f,amount:Number(f.amount)},...p]);setModal(null)}}}>Add Expense</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const getEvent = (id) => events.find(e => e.id === id) || null;

  // Event spending summaries
  const eventSpending = useMemo(() => {
    const m = {};
    expenses.forEach(e => {
      if (e.event) {
        if (!m[e.event]) m[e.event] = { total: 0, count: 0 };
        m[e.event].total += Number(e.amount);
        m[e.event].count++;
      }
    });
    return m;
  }, [expenses]);

  const filteredExpenses = useMemo(() => {
    if (eventFilter === "all") return expenses;
    if (eventFilter === "none") return expenses.filter(e => !e.event);
    return expenses.filter(e => e.event === eventFilter);
  }, [expenses, eventFilter]);

  const renderExpenses = () => (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
        <Btn onClick={()=>setModal("expense")}>+ Add Expense</Btn>
        <Btn onClick={()=>setModal("reminder")} variant="secondary">🔔 Reminders</Btn>
        <Btn variant="secondary" onClick={()=>setModal("event")}>🎯 New Event</Btn>
        <ImportBtn target="expense" />
        <Btn variant="secondary" onClick={()=>exportCSV(expenses,"expenses.csv",[{key:"date",label:"Date"},{key:"description",label:"Description"},{key:"category",label:"Category"},{key:"amount",label:"Amount"},{key:"event",label:"Event"}])}>↓ Export CSV</Btn>
      </div>
      <StatCard icon="▾" label="Total Expenses" value={fmt(totalExpense)} accent="#dc2626" />

      {/* Event Summary Cards */}
      {events.length > 0 && (
        <div style={{marginTop:18}}>
          <div style={{fontSize:13,fontWeight:600,color:T.heading,marginBottom:10}}>🎯 Events / Occasions</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:6}}>
            {events.map(ev => {
              const sp = eventSpending[ev.id] || { total: 0, count: 0 };
              const sel = eventFilter === ev.id;
              return (
                <div key={ev.id} onClick={()=>setEventFilter(sel?"all":ev.id)} style={{background:sel?"#f5f3ff":"#fff",borderRadius:12,padding:"14px 18px",border:`2px solid ${sel?"#7c3aed":T.border}`,boxShadow:T.shadow,cursor:"pointer",transition:"all 0.15s",minWidth:160,position:"relative"}}>
                  <button onClick={(e)=>{e.stopPropagation();setEvents(p=>p.filter(x=>x.id!==ev.id))}} style={{position:"absolute",top:6,right:8,background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:22}}>{ev.icon}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:sel?"#7c3aed":T.heading}}>{ev.name}</div>
                      <div style={{fontSize:11,color:T.textMuted}}>{ev.date}{ev.notes?` · ${ev.notes}`:""}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:4}}>
                    <span style={{fontSize:16,fontWeight:700,color:"#7c3aed",fontFamily:"'Playfair Display',serif"}}>{fmt(sp.total)}</span>
                    <span style={{fontSize:11,color:T.textMuted,alignSelf:"center"}}>{sp.count} expense{sp.count!==1?"s":""}</span>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Filter pills */}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8,marginBottom:4}}>
            <span style={{fontSize:11,color:T.textMuted,alignSelf:"center",marginRight:4}}>Filter:</span>
            {[{id:"all",label:"All"},{id:"none",label:"No Event"},...events.map(e=>({id:e.id,label:`${e.icon} ${e.name}`}))].map(f=>(
              <button key={f.id} onClick={()=>setEventFilter(f.id)} style={{padding:"4px 12px",borderRadius:16,border:`1px solid ${eventFilter===f.id?"#7c3aed":T.border}`,background:eventFilter===f.id?"#f5f3ff":"#fff",fontSize:11,cursor:"pointer",color:eventFilter===f.id?"#7c3aed":T.textSec,fontWeight:eventFilter===f.id?600:400}}>{f.label}</button>
            ))}
          </div>
        </div>
      )}

      <div style={{marginTop:18}} />
      {filteredExpenses.length ? (
        <Table columns={[
          {key:"date",label:"Date"},
          {key:"description",label:"Description"},
          {key:"category",label:"Category",render:r=><CatBadge category={r.category} />},
          {key:"event",label:"Event",render:r=><EventBadge event={getEvent(r.event)} />},
          {key:"amount",label:"Amount",render:r=><span style={{color:"#dc2626",fontWeight:600}}>{fmt(r.amount)}</span>}
        ]} data={filteredExpenses} onDelete={del(setExpenses)} />
      ) : <EmptyState icon="🧾" text={eventFilter!=="all"?"No expenses for this filter":"No expenses recorded yet"} />}
      <Modal open={modal==="expense"} onClose={()=>setModal(null)} title="New Expense"><ExpenseForm /></Modal>
      <Modal open={modal==="reminder"} onClose={()=>setModal(null)} title="🔔 Set Monthly Reminder"><ReminderForm /></Modal>
      {reminders.length > 0 && <div style={{background:"#fff",borderRadius:14,padding:22,border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow,marginTop:20}}>
        <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:12,fontFamily:"'Playfair Display',serif"}}>🔔 Monthly Reminders</div>
        {reminders.map(r=><div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(0,0,0,0.05)"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:500,color:T.heading}}>{r.description}</div>
            <div style={{fontSize:11,color:T.textMuted}}>₨{Number(r.amount).toLocaleString()} · {r.category} · Every {r.dayOfMonth}{r.dayOfMonth===1?"st":r.dayOfMonth===2?"nd":r.dayOfMonth===3?"rd":"th"}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setReminders(p=>p.map(x=>x.id===r.id?{...x,active:!x.active}:x))} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(0,0,0,0.08)",background:r.active?"#ecfdf5":"#f1f5f9",color:r.active?"#059669":"#94a3b8",fontSize:10,cursor:"pointer",fontWeight:600}}>{r.active?"ON":"OFF"}</button>
            <button onClick={()=>setReminders(p=>p.filter(x=>x.id!==r.id))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:14}}>×</button>
          </div>
        </div>)}
      </div>}
      <Modal open={modal==="event"} onClose={()=>setModal(null)} title="New Event / Occasion"><EventForm /></Modal>
    </div>
  );

  // ── Income ──
  const IncomeForm = () => {
    const [f, setF] = useState({ date: today(), source: "", description: "", amount: "" });
    return (
      <div>
        <Input label="Date" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />
        <Select label="Source" options={INCOME_SOURCES} value={f.source} onChange={e=>setF({...f,source:e.target.value})} />
        <Input label="Description" value={f.description} onChange={e=>setF({...f,description:e.target.value})} placeholder="e.g. March Salary" />
        <Input label="Amount (₨)" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" />
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.amount&&f.source){setIncomes(p=>[{id:uid(),...f,amount:Number(f.amount)},...p]);setModal(null)}}}>Add Income</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const renderIncome = () => (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
        <Btn onClick={()=>setModal("income")}>+ Add Income</Btn>
        <ImportBtn target="income" />
        <Btn variant="secondary" onClick={()=>exportCSV(incomes,"income.csv",[{key:"date",label:"Date"},{key:"source",label:"Source"},{key:"description",label:"Description"},{key:"amount",label:"Amount"}])}>↓ Export CSV</Btn>
      </div>
      <StatCard icon="▴" label="Total Income" value={fmt(totalIncome)} accent="#059669" />
      <div style={{marginTop:18}} />
      {incomes.length ? (
        <Table columns={[
          {key:"date",label:"Date"},
          {key:"source",label:"Source",render:r=><span style={{background:"#eff6ff",padding:"3px 10px",borderRadius:20,fontSize:12,color:"#2563eb",fontWeight:500}}>{r.source}</span>},
          {key:"description",label:"Description"},
          {key:"amount",label:"Amount",render:r=><span style={{color:"#059669",fontWeight:600}}>{fmt(r.amount)}</span>}
        ]} data={incomes} onDelete={del(setIncomes)} />
      ) : <EmptyState icon="💰" text="No income recorded yet" />}
      <Modal open={modal==="income"} onClose={()=>setModal(null)} title="New Income"><IncomeForm /></Modal>
    </div>
  );

  // ── Budget ──
  const BudgetForm = () => {
    const [f, setF] = useState({ category: "", limit: "", recurring: true });
    return (
      <div>
        <Select label="Category" options={EXPENSE_CATEGORIES} value={f.category} onChange={e=>setF({...f,category:e.target.value})} useCategoryIcons />
        <Input label="Monthly Limit (₨)" type="number" value={f.limit} onChange={e=>setF({...f,limit:e.target.value})} placeholder="0" />
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:8,letterSpacing:"0.03em",fontWeight:500}}>Budget Type</label>
          <div style={{display:"flex",gap:10}}>
            {[{v:true,label:"🔄 Recurring",desc:"Same every month until changed"},{v:false,label:"📌 One-time",desc:"Only for the selected month"}].map(opt=>(
              <button key={String(opt.v)} type="button" onClick={()=>setF({...f,recurring:opt.v})} style={{flex:1,padding:"12px 14px",borderRadius:10,border:`2px solid ${f.recurring===opt.v?"#059669":T.border}`,background:f.recurring===opt.v?"#ecfdf5":"#fff",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{fontSize:13,fontWeight:f.recurring===opt.v?600:400,color:f.recurring===opt.v?"#059669":T.text}}>{opt.label}</div>
                <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>{opt.desc}</div>
              </button>
            ))}
          </div>
        </div>
        {!f.recurring && <Input label="Month (e.g. Mar 2026)" value={f.month||""} onChange={e=>setF({...f,month:e.target.value})} placeholder={MONTHS[new Date().getMonth()]+" "+new Date().getFullYear()} />}
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{
            if(f.limit&&f.category){
              const existing = budgets.find(b=>b.category===f.category&&b.recurring===f.recurring&&(f.recurring||b.month===f.month));
              if(existing){
                setBudgets(p=>p.map(b=>b.id===existing.id?{...b,limit:Number(f.limit)}:b));
              } else {
                setBudgets(p=>[{id:uid(),category:f.category,limit:Number(f.limit),recurring:f.recurring,month:f.recurring?null:(f.month||MONTHS[new Date().getMonth()]+" "+new Date().getFullYear())},...p]);
              }
              setModal(null);
            }
          }}>Set Budget</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  // ── Budget month navigator ──
  const [budgetViewMonth, setBudgetViewMonth] = useState(() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  });

  const budgetMonthLabel = useMemo(() => {
    const [y, m] = budgetViewMonth.split("-");
    return MONTHS[parseInt(m)-1] + " " + y;
  }, [budgetViewMonth]);

  const shiftBudgetMonth = (dir) => {
    const [y, m] = budgetViewMonth.split("-").map(Number);
    const d = new Date(y, m - 1 + dir, 1);
    setBudgetViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  };

  // Compute budgets for the viewed month
  const budgetVsActual = useMemo(() => {
    const viewLabel = budgetMonthLabel;
    const results = [];
    const seen = new Set();

    // First: one-time budgets for this exact month
    budgets.filter(b => !b.recurring && b.month === viewLabel).forEach(b => {
      seen.add(b.category);
      const spent = expenses.filter(e => {
        const d = new Date(e.date);
        const eKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        return e.category === b.category && eKey === budgetViewMonth;
      }).reduce((s, e) => s + Number(e.amount), 0);
      results.push({ ...b, spent, remaining: b.limit - spent, pct: b.limit > 0 ? Math.min((spent / b.limit) * 100, 100) : 0, isRecurring: false });
    });

    // Then: recurring budgets (if no one-time override)
    budgets.filter(b => b.recurring).forEach(b => {
      if (seen.has(b.category)) return;
      seen.add(b.category);
      const spent = expenses.filter(e => {
        const d = new Date(e.date);
        const eKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        return e.category === b.category && eKey === budgetViewMonth;
      }).reduce((s, e) => s + Number(e.amount), 0);
      results.push({ ...b, spent, remaining: b.limit - spent, pct: b.limit > 0 ? Math.min((spent / b.limit) * 100, 100) : 0, isRecurring: true });
    });

    return results.sort((a, b) => b.spent - a.spent);
  }, [budgets, expenses, budgetViewMonth, budgetMonthLabel]);

  const totalBudgetLimit = budgetVsActual.reduce((s, b) => s + b.limit, 0);
  const totalBudgetSpent = budgetVsActual.reduce((s, b) => s + b.spent, 0);

  const renderBudget = () => (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
        <Btn onClick={()=>setModal("budget")}>+ Set Budget</Btn>
        <ImportBtn target="budget" />
        <Btn variant="secondary" onClick={()=>exportCSV(budgets,"budgets.csv",[{key:"category",label:"Category"},{key:"limit",label:"Limit"},{key:"recurring",label:"Recurring"},{key:"month",label:"Month"}])}>↓ Export CSV</Btn>
      </div>

      {/* Month Navigator */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20,background:"#fff",borderRadius:12,padding:"14px 20px",border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
        <button onClick={()=>shiftBudgetMonth(-1)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:T.textSec,padding:"4px 8px"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>{budgetMonthLabel}</div>
          <div style={{fontSize:11,color:T.textMuted}}>Budget overview</div>
        </div>
        <button onClick={()=>shiftBudgetMonth(1)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:T.textSec,padding:"4px 8px"}}>›</button>
      </div>

      {/* Total Summary */}
      {budgetVsActual.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:20}}>
          <StatCard icon="🎯" label="Total Budget" value={fmt(totalBudgetLimit)} accent="#2563eb" />
          <StatCard icon="💸" label="Total Spent" value={fmt(totalBudgetSpent)} accent={totalBudgetSpent>totalBudgetLimit?"#dc2626":"#059669"} sub={totalBudgetSpent<=totalBudgetLimit?`${fmt(totalBudgetLimit-totalBudgetSpent)} remaining`:`Over by ${fmt(totalBudgetSpent-totalBudgetLimit)}`} />
        </div>
      )}

      {budgetVsActual.length ? (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {budgetVsActual.map(b => {
            const m = getCatMeta(b.category);
            return (
              <div key={b.id+budgetViewMonth} style={{background:"#fff",borderRadius:12,padding:"18px 22px",border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{m.icon}</span>
                    <span style={{color:T.heading,fontWeight:600,fontSize:14}}>{b.category}</span>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:b.isRecurring?"#eff6ff":"#fefce8",color:b.isRecurring?"#2563eb":"#ca8a04",fontWeight:500,border:`1px solid ${b.isRecurring?"#2563eb20":"#ca8a0420"}`}}>{b.isRecurring?"🔄 Recurring":"📌 One-time"}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:13,color:b.pct>=90?"#dc2626":b.pct>=70?"#d97706":"#059669",fontWeight:500}}>{fmt(b.spent)} / {fmt(b.limit)}</span>
                    <button onClick={()=>del(setBudgets)(b.id)} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16}}>×</button>
                  </div>
                </div>
                <div style={{height:8,background:T.surfaceAlt,borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${b.pct}%`,borderRadius:4,background:b.pct>=90?"linear-gradient(90deg,#dc2626,#b91c1c)":b.pct>=70?"linear-gradient(90deg,#d97706,#b45309)":"linear-gradient(90deg,#059669,#047857)",transition:"width 0.5s"}} />
                </div>

  const investMonthly = useMemo(() => {
    const m = {};

  const investRate = totalIncome > 0 ? ((totalInvested / totalIncome) * 100).toFixed(1) : 0;
  const avgMonthlyInv = investMonthly.length > 0 ? Math.round(investMonthly.reduce((s,m)=>s+m.amount,0) / investMonthly.length) : 0;

  const renderInvestments = () => (

        <StatCard icon="📊" label="Investment Rate" value={investRate+"%"} accent="#2563eb" sub="of total income" />
        <StatCard icon="📈" label="Avg Monthly" value={fmt(avgMonthlyInv)} accent="#0891b2" />
      </div>
      {investByType.length > 0 && (
        <div style={{background:"#fff",borderRadius:14,padding:22,border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:16,fontFamily:"'Playfair Display',serif"}}>Portfolio Breakdown</div>
          <SimplePie data={investByType} height={160} />
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginTop:8}}>
            {investByType.map((c,i) => (
              <div key={c.name} style={{fontSize:11,color:T.textSec,display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:COLORS[i%COLORS.length],display:"inline-block"}} />{c.name}: {fmt(c.value)}

          </div>
        </div>

      {investMonthly.length > 0 && <div style={{background:"#fff",borderRadius:14,padding:22,border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow,marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>Monthly Investment Trend</div>
        <SimpleBar data={investMonthly} dataKeyX="month" dataKeyY="amount" fill="#7c3aed" height={140} showK />
      </div>}
      {investments.length ? (
        <Table columns={[
          {key:"date",label:"Date"},

          {key:"amount",label:"Amount",render:r=><span style={{color:"#2563eb",fontWeight:600}}>{fmt(r.amount)}</span>},

      <Modal open={modal==="invest"} onClose={()=>setModal(null)} title="New Investment"><InvestForm /></Modal>
    </div>

  // ── Ledger ──
  const LedgerForm = () => {

      <div>
        <Input label="Date" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:5,letterSpacing:"0.03em",fontWeight:500}}>Type</label>
          <div style={{display:"flex",gap:10}}>
            {[["payable","I owe them ↓"],["receivable","They owe me ↑"]].map(([v,l])=>(
              <button key={v} onClick={()=>setF({...f,type:v})} style={{flex:1,padding:"10px 16px",borderRadius:8,border:`1px solid ${f.type===v?"#059669":T.borderStrong}`,background:f.type===v?"#ecfdf5":T.inputBg,color:f.type===v?"#059669":T.textSec,fontSize:13,cursor:"pointer",fontWeight:f.type===v?600:400}}>{l}</button>

        </div>
        <Input label="Person / Entity" value={f.person} onChange={e=>setF({...f,person:e.target.value})} placeholder="e.g. Ahmad" />
        <Input label="Description" value={f.description} onChange={e=>setF({...f,description:e.target.value})} placeholder="e.g. Loan for car repair" />
        <Input label="Amount (₨)" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" />

  const toggleSettle = (id) => setLedger(p => p.map(l => l.id === id ? { ...l, settled: !l.settled } : l));

    return (
      <div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
          <Btn onClick={()=>setModal("ledger")}>+ Add Entry</Btn>
          <ImportBtn target="ledger" />
          <Btn variant="secondary" onClick={()=>exportCSV(ledger,"ledger.csv",[{key:"date",label:"Date"},{key:"type",label:"Type"},{key:"person",label:"Person"},{key:"description",label:"Description"},{key:"amount",label:"Amount"},{key:"settled",label:"Settled"}])}>↓ Export CSV</Btn>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:22}}>
          <StatCard icon="↑" label="Total Receivable" value={fmt(totalReceivable)} accent="#d97706" sub={`${receivables.filter(r=>!r.settled).length} unsettled`} />

                <button onClick={()=>toggleSettle(l.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${l.settled?"#059669":T.borderStrong}`,background:l.settled?"#059669":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0}}>{l.settled?"✓":""}</button>

                  <div style={{color:T.heading,fontSize:14,fontWeight:500}}>{l.person} <span style={{color:T.textMuted,fontSize:12}}>· {l.description}</span></div>

                </div>
                <span style={{color:"#d97706",fontWeight:700,fontSize:15}}>{fmt(l.amount)}</span>
                <button onClick={()=>del(setLedger)(l.id)} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16,padding:4}}>×</button>
              </div>

          </div>

                <button onClick={()=>toggleSettle(l.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${l.settled?"#059669":T.borderStrong}`,background:l.settled?"#059669":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0}}>{l.settled?"✓":""}</button>
                <div style={{flex:1}}>
                  <div style={{color:T.heading,fontSize:14,fontWeight:500}}>{l.person} <span style={{color:T.textMuted,fontSize:12}}>· {l.description}</span></div>
                  <div style={{color:T.textMuted,fontSize:11,marginTop:2}}>{l.date}{l.settled?" · Settled":""}</div>
                </div>
                <span style={{color:"#db2777",fontWeight:700,fontSize:15}}>{fmt(l.amount)}</span>
                <button onClick={()=>del(setLedger)(l.id)} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16,padding:4}}>×</button>
              </div>

        <Modal open={modal==="ledger"} onClose={()=>setModal(null)} title="New Payable / Receivable"><LedgerForm /></Modal>
      </div>
    );

    {i:"💍",l:"Wedding"},{i:"🎓",l:"Education"},{i:"🏥",l:"Medical"},{i:"👶",l:"Baby"},

      <div>

        <Input label="Amount (₨)" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" />
        {savingsGoals.length > 0 && <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:6,fontWeight:500}}>Link to Goal</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <button type="button" onClick={()=>setF({...f,goalId:""})} style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(f.goalId?"rgba(0,0,0,0.07)":"#059669"),background:f.goalId?"#fff":"#ecfdf5",fontSize:11,cursor:"pointer",color:f.goalId?"#64748b":"#059669",fontWeight:f.goalId?400:600}}>None</button>
            {savingsGoals.map(g=><button key={g.id} type="button" onClick={()=>setF({...f,goalId:g.id})} style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(f.goalId===g.id?"#2563eb":"rgba(0,0,0,0.07)"),background:f.goalId===g.id?"#eff6ff":"#fff",fontSize:11,cursor:"pointer",color:f.goalId===g.id?"#2563eb":"#1e293b",fontWeight:f.goalId===g.id?600:400}}>{g.icon} {g.name}</button>)}
          </div>
        </div>}
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.amount){setSavings(p=>[{id:uid(),...f,amount:Number(f.amount)},...p]);setModal(null)}}}>Add Savings</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const GoalForm = () => {
    const [f, setF] = useState({ name: "", icon: "🚗", target: "", deadline: "" });
    return (
      <div>
        <Input label="Goal Name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. New Car, House Down Payment" />

          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {GOAL_ICONS.map(g=><button key={g.i} type="button" onClick={()=>setF({...f,icon:g.i})} style={{width:52,height:52,borderRadius:10,border:"2px solid "+(f.icon===g.i?"#2563eb":"rgba(0,0,0,0.07)"),background:f.icon===g.i?"#eff6ff":"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,padding:2}}>
              <span style={{fontSize:18}}>{g.i}</span>
              <span style={{fontSize:7,color:f.icon===g.i?"#2563eb":"#94a3b8",fontWeight:500}}>{g.l}</span>
            </button>)}
          </div>
        </div>
        <Input label="Target Amount (₨)" type="number" value={f.target} onChange={e=>setF({...f,target:e.target.value})} placeholder="e.g. 2000000" />
        <Input label="Target Date (optional)" type="date" value={f.deadline} onChange={e=>setF({...f,deadline:e.target.value})} />
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.name&&f.target){setSavingsGoals(p=>[{id:uid(),...f,target:Number(f.target)},...p]);setModal(null)}}}>Create Goal</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const savingsByType = useMemo(() => {
    const m = {};
    savings.forEach(s => { m[s.type] = (m[s.type] || 0) + Number(s.amount); });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [savings]);

  const savingsMonthly = useMemo(() => {
    const m = {};
    savings.forEach(s => {
      const d = new Date(s.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label = MONTHS[d.getMonth()] + " " + d.getFullYear();
      if (!m[key]) m[key] = { key, month: label, amount: 0 };
      m[key].amount += Number(s.amount);
    });
    return Object.values(m).sort((a, b) => a.key.localeCompare(b.key)).slice(-6);
  }, [savings]);

  const savingsRate = totalIncome > 0 ? ((totalSaved / totalIncome) * 100).toFixed(1) : 0;
  const avgMonthlySav = savingsMonthly.length > 0 ? Math.round(savingsMonthly.reduce((s,m)=>s+m.amount,0) / savingsMonthly.length) : 0;

  const renderSavings = () => (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>

        <Btn onClick={()=>setModal("goal")} variant="secondary">🎯 New Goal</Btn>
        <ImportBtn target="savings" />
        <Btn variant="secondary" onClick={()=>exportCSV(savings,"savings.csv",[{key:"date",label:"Date"},{key:"type",label:"Type"},{key:"description",label:"Description"},{key:"amount",label:"Amount"},{key:"goalId",label:"Goal"}])}>↓ Export CSV</Btn>
      </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:24}}>{g.icon}</span><div><div style={{fontSize:14,fontWeight:600,color:T.heading}}>{g.name}</div><div style={{fontSize:10,color:T.textMuted}}>{g.deadline ? "Deadline: "+g.deadline : "No deadline"}{daysLeft !== null ? " · "+daysLeft+" days left" : ""}</div></div></div>
              <button onClick={()=>setSavingsGoals(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
              <div><div style={{fontSize:9,color:T.textMuted}}>Saved</div><div style={{fontSize:16,fontWeight:700,color:"#2563eb",fontFamily:"'Playfair Display',serif"}}>{fmt(saved)}</div></div>
              <div><div style={{fontSize:9,color:T.textMuted}}>Target</div><div style={{fontSize:16,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>{fmt(g.target)}</div></div>
              <div><div style={{fontSize:9,color:T.textMuted}}>Progress</div><div style={{fontSize:16,fontWeight:700,color:pct>=100?"#059669":"#d97706",fontFamily:"'Playfair Display',serif"}}>{pct.toFixed(1)}%</div></div>
              {remaining>0 && <div><div style={{fontSize:9,color:T.textMuted}}>Remaining</div><div style={{fontSize:16,fontWeight:700,color:"#dc2626",fontFamily:"'Playfair Display',serif"}}>{fmt(remaining)}</div></div>}
              {perMonth && <div><div style={{fontSize:9,color:T.textMuted}}>Need/month</div><div style={{fontSize:16,fontWeight:700,color:"#7c3aed",fontFamily:"'Playfair Display',serif"}}>{fmt(perMonth)}</div></div>}
            </div>
          </div>;
