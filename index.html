            {receivables.map(l => (
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",background:"#fff",borderRadius:10,marginBottom:8,border:`1px solid ${T.border}`,boxShadow:T.shadow,opacity:l.settled?0.5:1}}>
                <button onClick={()=>toggleSettle(l.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${l.settled?"#059669":T.borderStrong}`,background:l.settled?"#059669":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0}}>{l.settled?"✓":""}</button>
                <div style={{flex:1}}>
                  <div style={{color:T.heading,fontSize:14,fontWeight:500}}>{l.person} <span style={{color:T.textMuted,fontSize:12}}>· {l.description}</span></div>
                  <div style={{color:T.textMuted,fontSize:11,marginTop:2}}>{l.date}{l.settled?" · Settled":""}</div>
                </div>
                <span style={{color:"#d97706",fontWeight:700,fontSize:15}}>{fmt(l.amount)}</span>
                <button onClick={()=>del(setLedger)(l.id)} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16,padding:4}}>×</button>
              </div>
            ))}
          </div>
        )}

        {payables.length > 0 && (
          <div>
            <div style={{fontSize:14,fontWeight:600,color:"#db2777",marginBottom:12,fontFamily:"'Playfair Display',serif"}}>↓ To Pay</div>
            {payables.map(l => (
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",background:"#fff",borderRadius:10,marginBottom:8,border:`1px solid ${T.border}`,boxShadow:T.shadow,opacity:l.settled?0.5:1}}>
                <button onClick={()=>toggleSettle(l.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${l.settled?"#059669":T.borderStrong}`,background:l.settled?"#059669":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0}}>{l.settled?"✓":""}</button>
                <div style={{flex:1}}>
                  <div style={{color:T.heading,fontSize:14,fontWeight:500}}>{l.person} <span style={{color:T.textMuted,fontSize:12}}>· {l.description}</span></div>
                  <div style={{color:T.textMuted,fontSize:11,marginTop:2}}>{l.date}{l.settled?" · Settled":""}</div>
                </div>
                <span style={{color:"#db2777",fontWeight:700,fontSize:15}}>{fmt(l.amount)}</span>
                <button onClick={()=>del(setLedger)(l.id)} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:16,padding:4}}>×</button>
              </div>
            ))}
          </div>
        )}

        {!ledger.length && <EmptyState icon="🤝" text="No payables or receivables recorded yet" />}
        <Modal open={modal==="ledger"} onClose={()=>setModal(null)} title="New Payable / Receivable"><LedgerForm /></Modal>
      </div>
    );
  };

  // ── Savings ──
  const GOAL_ICONS = [
    {i:"🚗",l:"Car"},{i:"🏠",l:"House"},{i:"✈️",l:"Travel"},{i:"📱",l:"Phone"},
    {i:"💍",l:"Wedding"},{i:"🎓",l:"Education"},{i:"🏥",l:"Medical"},{i:"👶",l:"Baby"},
    {i:"💰",l:"Savings"},{i:"🎯",l:"Other"}
  ];
  
  const SavingsForm = () => {
    const [f, setF] = useState({ date: today(), type: "General Savings", description: "", amount: "", goalId: "" });
    return (
      <div>
        <Input label="Date" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />
        <Select label="Savings Type" options={SAVINGS_TYPES} value={f.type} onChange={e=>setF({...f,type:e.target.value})} />
        <Input label="Description" value={f.description} onChange={e=>setF({...f,description:e.target.value})} placeholder="e.g. Monthly savings from salary" />
        <Input label="Amount (₨)" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" />
        {savingsGoals.length > 0 && <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:6,fontWeight:500}}>Link to Goal</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <button type="button" onClick={()=>setF({...f,goalId:""})} style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(f.goalId?"rgba(0,0,0,0.07)":"#059669"),background:f.goalId?"#fff":"#ecfdf5",fontSize:11,cursor:"pointer",color:f.goalId?"#64748b":"#059669",fontWeight:f.goalId?400:600}}>None</button>
            {savingsGoals.map(g=><button key={g.id} type="button" onClick={()=>setF({...f,goalId:g.id})} style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(f.goalId===g.id?"#2563eb":"rgba(0,0,0,0.07)"),background:f.goalId===g.id?"#eff6ff":"#fff",fontSize:11,cursor:"pointer",color:f.goalId===g.id?"#2563eb":"#1e293b",fontWeight:f.goalId===g.id?600:400}}>{g.icon} {g.name}</button>)}
          </div>
        </div>}
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.amount){setSavings(p=>[{id:uid(),...f,amount:Number(f.amount)},...p]);setModal(null)}}}>Add Savings</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const GoalForm = () => {
    const [f, setF] = useState({ name: "", icon: "🚗", target: "", deadline: "" });
    return (
      <div>
        <Input label="Goal Name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. New Car, House Down Payment" />
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:6,fontWeight:500}}>Icon</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {GOAL_ICONS.map(g=><button key={g.i} type="button" onClick={()=>setF({...f,icon:g.i})} style={{width:52,height:52,borderRadius:10,border:"2px solid "+(f.icon===g.i?"#2563eb":"rgba(0,0,0,0.07)"),background:f.icon===g.i?"#eff6ff":"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,padding:2}}>
              <span style={{fontSize:18}}>{g.i}</span>
              <span style={{fontSize:7,color:f.icon===g.i?"#2563eb":"#94a3b8",fontWeight:500}}>{g.l}</span>
            </button>)}
          </div>
        </div>
        <Input label="Target Amount (₨)" type="number" value={f.target} onChange={e=>setF({...f,target:e.target.value})} placeholder="e.g. 2000000" />
        <Input label="Target Date (optional)" type="date" value={f.deadline} onChange={e=>setF({...f,deadline:e.target.value})} />
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn onClick={()=>{if(f.name&&f.target){setSavingsGoals(p=>[{id:uid(),...f,target:Number(f.target)},...p]);setModal(null)}}}>Create Goal</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  const savingsByType = useMemo(() => {
    const m = {};
    savings.forEach(s => { m[s.type] = (m[s.type] || 0) + Number(s.amount); });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [savings]);

  const savingsMonthly = useMemo(() => {
    const m = {};
    savings.forEach(s => {
      const d = new Date(s.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label = MONTHS[d.getMonth()] + " " + d.getFullYear();
      if (!m[key]) m[key] = { key, month: label, amount: 0 };
      m[key].amount += Number(s.amount);
    });
    return Object.values(m).sort((a, b) => a.key.localeCompare(b.key)).slice(-6);
  }, [savings]);

  const savingsRate = totalIncome > 0 ? ((totalSaved / totalIncome) * 100).toFixed(1) : 0;
  const avgMonthlySav = savingsMonthly.length > 0 ? Math.round(savingsMonthly.reduce((s,m)=>s+m.amount,0) / savingsMonthly.length) : 0;

  // ── Withdrawal Form ──
  const WithdrawForm = ({ savingsId }) => {
    const savEntry = savings.find(s => s.id === savingsId);
    const alreadyWithdrawn = savingsWithdrawals.filter(w => w.savingsId === savingsId).reduce((s,w)=>s+Number(w.amount),0);
    const available = savEntry ? Number(savEntry.amount) - alreadyWithdrawn : 0;
    const [f, setF] = useState({ date: today(), item: "", amount: String(available > 0 ? available : ""), notes: "" });
    const amtNum = Number(f.amount) || 0;
    const isOver = amtNum > available;
    return (
      <div>
        {/* Savings context card */}
        <div style={{background:"#f0fdf4",borderRadius:10,padding:"12px 16px",marginBottom:18,border:"1px solid #bbf7d0"}}>
          <div style={{fontSize:11,color:"#059669",fontWeight:600,marginBottom:4}}>Withdrawing from</div>
          <div style={{fontSize:14,fontWeight:700,color:T.heading}}>{savEntry?.description || savEntry?.type || "Savings"}</div>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>Saved</div><div style={{fontSize:15,fontWeight:700,color:"#2563eb"}}>{fmt(Number(savEntry?.amount||0))}</div></div>
            <div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>Already Used</div><div style={{fontSize:15,fontWeight:700,color:"#d97706"}}>{fmt(alreadyWithdrawn)}</div></div>
            <div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>Available</div><div style={{fontSize:15,fontWeight:700,color:available>0?"#059669":"#dc2626"}}>{fmt(available)}</div></div>
          </div>
        </div>
        <Input label="Date Used" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />
        <Input label="What did you spend it on?" value={f.item} onChange={e=>setF({...f,item:e.target.value})} placeholder="e.g. iPhone 16 Pro, Car repair, Medical bill…" />
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:5,fontWeight:500}}>Amount Used (₨)</label>
          <input type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} placeholder="0" style={{width:"100%",boxSizing:"border-box",padding:"10px 14px",background:isOver?"#fef2f2":T.inputBg,border:`1px solid ${isOver?"#dc2626":T.border}`,borderRadius:8,color:T.text,fontSize:14,outline:"none"}} />
          {isOver && <div style={{fontSize:11,color:"#dc2626",marginTop:4}}>⚠️ Amount exceeds available balance of {fmt(available)}</div>}
          {/* Quick-fill buttons */}
          {available > 0 && (
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              {[25,50,75,100].map(pct => (
                <button key={pct} type="button" onClick={()=>setF({...f,amount:String(Math.round(available*pct/100))})} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${T.border}`,background:"#fff",fontSize:11,cursor:"pointer",color:T.textSec,fontWeight:500}}>
                  {pct}% · {fmt(Math.round(available*pct/100))}
                </button>
              ))}
              <button type="button" onClick={()=>setF({...f,amount:String(available)})} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #059669",background:"#ecfdf5",fontSize:11,cursor:"pointer",color:"#059669",fontWeight:600}}>Full amount</button>
            </div>
          )}
        </div>
        <Input label="Notes (optional)" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="e.g. Bought from iShopping, paid cash" />
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <Btn
            onClick={()=>{
              if(!f.item||!f.amount||amtNum<=0) return;
              setSavingsWithdrawals(p=>[{id:uid(),savingsId,date:f.date,item:f.item,amount:amtNum,notes:f.notes},...p]);
              setModal(null);
            }}
            style={{opacity:(!f.item||!f.amount||amtNum<=0||isOver)?0.5:1}}
          >💸 Record Withdrawal</Btn>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
        </div>
      </div>
    );
  };

  // ── Goal-level Withdrawal Form ──
  // Bulk-withdraws from all savings entries linked to a goal
  const GoalWithdrawForm = ({ goalId }) => {
    const goal = savingsGoals.find(g => g.id === goalId);
    const linkedEntries = savings.filter(s => s.goalId === goalId);

    // Per-entry available balance
    const withdrawnBySavings = {};
    savingsWithdrawals.forEach(w => {
      withdrawnBySavings[w.savingsId] = (withdrawnBySavings[w.savingsId] || 0) + Number(w.amount);
    });
    const entriesWithAvail = linkedEntries.map(s => ({
      ...s,
      withdrawn: withdrawnBySavings[s.id] || 0,
      available: Number(s.amount) - (withdrawnBySavings[s.id] || 0),
    })).filter(s => s.available > 0);

    const totalAvailable = entriesWithAvail.reduce((s, e) => s + e.available, 0);
    const [f, setF] = useState({ date: today(), item: "", amount: String(totalAvailable), notes: "" });
    const amtNum = Number(f.amount) || 0;
    const isOver = amtNum > totalAvailable;

    const handleWithdraw = () => {
      if (!f.item || amtNum <= 0 || isOver) return;
      // Distribute withdrawal across entries oldest-first (sort by date asc)
      const sorted = [...entriesWithAvail].sort((a, b) => a.date.localeCompare(b.date));
      let remaining = amtNum;
      const newWithdrawals = [];
      for (const entry of sorted) {
        if (remaining <= 0) break;
        const take = Math.min(entry.available, remaining);
        newWithdrawals.push({
          id: uid(), savingsId: entry.id,
          date: f.date, item: f.item,
          amount: take, notes: f.notes,
          goalId, // tag it to the goal for easy lookup
        });
        remaining -= take;
      }
      setSavingsWithdrawals(p => [...newWithdrawals, ...p]);
      setModal(null);
    };

    if (!goal) return null;

    return (
      <div>
        {/* Goal context */}
        <div style={{background:"linear-gradient(135deg,#f5f3ff,#ede9fe)",borderRadius:12,padding:"14px 16px",marginBottom:18,border:"1px solid #c4b5fd"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:28}}>{goal.icon}</span>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#4c1d95"}}>{goal.name}</div>
              <div style={{fontSize:11,color:"#7c3aed"}}>{linkedEntries.length} savings {linkedEntries.length===1?"entry":"entries"} linked to this goal</div>
            </div>
          </div>
          {/* Entry breakdown */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {entriesWithAvail.map(e => (
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.6)",borderRadius:8,padding:"7px 10px"}}>
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:"#1e293b"}}>{e.description||e.type}</div>
                  <div style={{fontSize:10,color:"#64748b"}}>{e.date}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#059669"}}>{fmt(e.available)} available</div>
                  {e.withdrawn>0 && <div style={{fontSize:10,color:"#d97706"}}>{fmt(e.withdrawn)} already used</div>}
                </div>
              </div>
            ))}
            {entriesWithAvail.length === 0 && (
              <div style={{fontSize:12,color:"#7c3aed",textAlign:"center",padding:"8px 0"}}>All savings from this goal have already been withdrawn.</div>
            )}
          </div>
          <div style={{display:"flex",gap:16,marginTop:12,paddingTop:10,borderTop:"1px solid #c4b5fd40"}}>
            <div><div style={{fontSize:9,color:"#7c3aed",textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>Total Available</div><div style={{fontSize:16,fontWeight:700,color:"#059669"}}>{fmt(totalAvailable)}</div></div>
            <div><div style={{fontSize:9,color:"#7c3aed",textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>Entries to mark</div><div style={{fontSize:16,fontWeight:700,color:"#7c3aed"}}>{entriesWithAvail.length}</div></div>
          </div>
        </div>

        {entriesWithAvail.length > 0 && <>
          <Input label="Date Spent" type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} />
          <Input label="What did you spend this goal on?" value={f.item} onChange={e=>setF({...f,item:e.target.value})} placeholder={`e.g. Bought ${goal.name}, Paid for ${goal.name}…`} />

          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:5,fontWeight:500}}>Amount to Withdraw (₨)</label>
            <input type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})} style={{width:"100%",boxSizing:"border-box",padding:"10px 14px",background:isOver?"#fef2f2":T.inputBg,border:`1px solid ${isOver?"#dc2626":T.border}`,borderRadius:8,color:T.text,fontSize:14,outline:"none"}} />
            {isOver && <div style={{fontSize:11,color:"#dc2626",marginTop:4}}>⚠️ Cannot exceed available balance of {fmt(totalAvailable)}</div>}
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              {[50,75,100].map(pct=>(
                <button key={pct} type="button" onClick={()=>setF({...f,amount:String(Math.round(totalAvailable*pct/100))})} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${T.border}`,background:"#fff",fontSize:11,cursor:"pointer",color:T.textSec,fontWeight:500}}>
                  {pct}% · {fmt(Math.round(totalAvailable*pct/100))}
                </button>
              ))}
              <button type="button" onClick={()=>setF({...f,amount:String(totalAvailable)})} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #059669",background:"#ecfdf5",fontSize:11,cursor:"pointer",color:"#059669",fontWeight:600}}>Full {fmt(totalAvailable)}</button>
            </div>
            <div style={{fontSize:10,color:T.textMuted,marginTop:6}}>Amount will be distributed across entries oldest-first.</div>
          </div>

          <Input label="Notes (optional)" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="e.g. Bought from iShopping, cash payment" />

          <div style={{display:"flex",gap:10,marginTop:18}}>
            <Btn onClick={handleWithdraw} style={{opacity:(!f.item||amtNum<=0||isOver)?0.5:1}}>
              💸 Withdraw &amp; Mark All Entries Used
            </Btn>
            <Btn variant="secondary" onClick={()=>setModal(null)}>Cancel</Btn>
          </div>
        </>}
        {entriesWithAvail.length === 0 && (
          <Btn variant="secondary" onClick={()=>setModal(null)}>Close</Btn>
        )}
      </div>
    );
  };

  const renderSavings = () => {
    // Compute per-savings-entry withdrawn amounts
    const withdrawnBySavings = {};
    savingsWithdrawals.forEach(w => {
      withdrawnBySavings[w.savingsId] = (withdrawnBySavings[w.savingsId] || 0) + Number(w.amount);
    });
    const totalWithdrawn = savingsWithdrawals.reduce((s,w)=>s+Number(w.amount),0);
    const netSaved = totalSaved - totalWithdrawn;

    return (
    <div>
      {/* Action bar */}
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
        <Btn onClick={()=>setModal("savings")}>+ Add Savings</Btn>
        <Btn onClick={()=>setModal("goal")} variant="secondary">🎯 New Goal</Btn>
        <ImportBtn target="savings" />
        <Btn variant="secondary" onClick={()=>exportCSV(savings,"savings.csv",[{key:"date",label:"Date"},{key:"type",label:"Type"},{key:"description",label:"Description"},{key:"amount",label:"Amount"},{key:"goalId",label:"Goal"}])}>↓ Export CSV</Btn>
      </div>

      {/* Stat cards */}
      <div className="stat-card-grid" style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:20}}>
        <StatCard icon="🏦" label="Total Saved" value={fmt(totalSaved)} accent="#2563eb" />
        <StatCard icon="💸" label="Total Withdrawn" value={fmt(totalWithdrawn)} accent="#d97706" sub={savingsWithdrawals.length+" withdrawal"+(savingsWithdrawals.length!==1?"s":"")} />
        <StatCard icon="✅" label="Net Available" value={fmt(netSaved)} accent={netSaved>=0?"#059669":"#dc2626"} />
        <StatCard icon="📊" label="Savings Rate" value={savingsRate+"%"} accent="#7c3aed" sub="of total income" />
      </div>

      {savingsGoals.length > 0 && (
        <div style={{background:"#fff",borderRadius:14,border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow,marginBottom:20,overflow:"hidden"}}>

          {/* Collapsible header — always visible */}
          <div
            onClick={()=>setGoalsCollapsed(c=>!c)}
            style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",cursor:"pointer",userSelect:"none",background:goalsCollapsed?"#fff":"#f8faff",borderBottom:goalsCollapsed?"none":`1px solid ${T.border}`,transition:"background 0.15s"}}
          >
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>🎯</span>
              <div>
                <span style={{fontSize:14,fontWeight:600,color:T.heading,fontFamily:"'Playfair Display',serif"}}>Savings Goals</span>
                <span style={{marginLeft:10,fontSize:11,fontWeight:600,background:"#eff6ff",color:"#2563eb",padding:"2px 8px",borderRadius:12}}>{savingsGoals.length} goal{savingsGoals.length!==1?"s":""}</span>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {goalsCollapsed && (
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {savingsGoals.slice(0,3).map(g=>(
                    <span key={g.id} style={{fontSize:18}} title={g.name}>{g.icon}</span>
                  ))}
                  {savingsGoals.length>3 && <span style={{fontSize:11,color:T.textMuted,fontWeight:600}}>+{savingsGoals.length-3}</span>}
                </div>
              )}
              <div style={{width:28,height:28,borderRadius:8,background:T.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",color:T.textSec,fontSize:16,fontWeight:700,transition:"transform 0.25s",transform:goalsCollapsed?"none":"rotate(180deg)"}}>
                ⌄
              </div>
            </div>
          </div>

          {/* Body — only rendered when expanded */}
          {!goalsCollapsed && (
            <div style={{padding:"14px 18px 18px"}}>
              {savingsGoals.map(g => {
                const goalEntries = savings.filter(s=>s.goalId===g.id);
                const saved = goalEntries.reduce((s,e)=>s+Number(e.amount),0);
                const pct = g.target > 0 ? Math.min((saved/g.target)*100,100) : 0;
                const remaining = Math.max(0, g.target - saved);
                const daysLeft = g.deadline ? Math.max(0, Math.ceil((new Date(g.deadline) - new Date()) / 86400000)) : null;
                const perMonth = daysLeft && remaining > 0 ? Math.ceil(remaining / Math.max(1, daysLeft/30)) : null;
                const goalWithdrawals = savingsWithdrawals.filter(w => goalEntries.some(e=>e.id===w.savingsId));
                const totalGoalWithdrawn = goalWithdrawals.reduce((s,w)=>s+Number(w.amount),0);
                const goalAvailable = saved - totalGoalWithdrawn;
                const isFullyWithdrawn = goalAvailable <= 0 && saved > 0;

                return (
                  <div key={g.id} style={{background:"#f8f9fc",borderRadius:12,padding:"16px 18px",marginBottom:10,position:"relative",border:`1px solid ${isFullyWithdrawn?"#fecaca":T.border}`}}>
                    {/* Progress bar */}
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:4,background:"#dbeafe",borderRadius:"0 0 12px 12px"}}>
                      <div style={{height:"100%",width:pct+"%",background:pct>=100?"#059669":"#2563eb",borderRadius:"0 0 12px 12px"}} />
                    </div>

                    {/* Header */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:24}}>{g.icon}</span>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <div style={{fontSize:14,fontWeight:600,color:T.heading}}>{g.name}</div>
                            {isFullyWithdrawn && <span style={{fontSize:10,fontWeight:700,color:"#dc2626",background:"#fef2f2",padding:"2px 8px",borderRadius:12,border:"1px solid #fecaca"}}>💸 Fully Used</span>}
                            {totalGoalWithdrawn>0&&!isFullyWithdrawn && <span style={{fontSize:10,fontWeight:700,color:"#d97706",background:"#fffbeb",padding:"2px 8px",borderRadius:12,border:"1px solid #fde68a"}}>📬 Partially Used</span>}
                          </div>
                          <div style={{fontSize:10,color:T.textMuted}}>{g.deadline?"Deadline: "+g.deadline:"No deadline"}{daysLeft!==null?" · "+daysLeft+" days left":""}</div>
                        </div>
                      </div>
                      <button onClick={()=>setSavingsGoals(p=>p.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:16,flexShrink:0}}>×</button>
                    </div>

                    {/* Stats */}
                    <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:12}}>
                      <div><div style={{fontSize:9,color:T.textMuted}}>Saved</div><div style={{fontSize:16,fontWeight:700,color:"#2563eb",fontFamily:"'Playfair Display',serif"}}>{fmt(saved)}</div></div>
                      <div><div style={{fontSize:9,color:T.textMuted}}>Target</div><div style={{fontSize:16,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>{fmt(g.target)}</div></div>
                      <div><div style={{fontSize:9,color:T.textMuted}}>Progress</div><div style={{fontSize:16,fontWeight:700,color:pct>=100?"#059669":"#d97706",fontFamily:"'Playfair Display',serif"}}>{pct.toFixed(1)}%</div></div>
                      {remaining>0 && <div><div style={{fontSize:9,color:T.textMuted}}>Remaining</div><div style={{fontSize:16,fontWeight:700,color:"#dc2626",fontFamily:"'Playfair Display',serif"}}>{fmt(remaining)}</div></div>}
                      {perMonth && <div><div style={{fontSize:9,color:T.textMuted}}>Need/month</div><div style={{fontSize:16,fontWeight:700,color:"#7c3aed",fontFamily:"'Playfair Display',serif"}}>{fmt(perMonth)}</div></div>}
                      {totalGoalWithdrawn>0 && <div><div style={{fontSize:9,color:T.textMuted}}>Used so far</div><div style={{fontSize:16,fontWeight:700,color:"#d97706",fontFamily:"'Playfair Display',serif"}}>{fmt(totalGoalWithdrawn)}</div></div>}
                      {goalAvailable>0 && <div><div style={{fontSize:9,color:T.textMuted}}>Still available</div><div style={{fontSize:16,fontWeight:700,color:"#059669",fontFamily:"'Playfair Display',serif"}}>{fmt(goalAvailable)}</div></div>}
                    </div>

                    {/* Withdraw button */}
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                      {goalAvailable>0 && (
                        <button onClick={()=>{setWithdrawGoalId(g.id);setModal("goal_withdraw");}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:9,background:"linear-gradient(135deg,#d97706,#b45309)",color:"#fff",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(217,119,6,0.25)"}}>
                          💸 Use this Saving · {fmt(goalAvailable)} available
                        </button>
                      )}
                      {isFullyWithdrawn && <span style={{fontSize:12,color:"#dc2626",fontWeight:500}}>✓ All saved money has been used</span>}
                    </div>

                    {/* Withdrawal history */}
                    {goalWithdrawals.length>0 && (
                      <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
                        <div style={{fontSize:10,fontWeight:700,color:T.textSec,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Withdrawal History</div>
                        {[...goalWithdrawals].sort((a,b)=>b.date.localeCompare(a.date)).map(w=>(
                          <div key={w.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#fff",borderRadius:8,marginBottom:6,border:"1px solid #fde68a"}}>
                            <span style={{fontSize:16,flexShrink:0}}>💸</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,color:T.heading,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.item}</div>
                              <div style={{fontSize:10,color:T.textMuted}}>{w.date}{w.notes?" · "+w.notes:""}</div>
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:"#d97706",flexShrink:0}}>{fmt(Number(w.amount))}</div>
                            <button onClick={()=>setSavingsWithdrawals(p=>p.filter(x=>x.id!==w.id))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:14,padding:2,flexShrink:0}}>×</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Charts row */}
      <div style={{display:"flex",flexWrap:"wrap",gap:20,marginBottom:20}}>
        {savingsByType.length > 0 && <div style={{flex:"1 1 260px",background:"#fff",borderRadius:14,padding:22,border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow}}>
          <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>By Type</div>
          <SimplePie data={savingsByType} height={160} />
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px",marginTop:8,justifyContent:"center"}}>
            {savingsByType.map((s,i)=><div key={s.name} style={{fontSize:10,color:"#475569",display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:["#059669","#2563eb","#d97706","#dc2626","#7c3aed","#db2777","#0891b2","#65a30d"][i%8],display:"inline-block"}} />{s.name}: {fmt(s.value)} ({totalSaved>0?((s.value/totalSaved)*100).toFixed(1):0}%)
            </div>)}
          </div>
        </div>}
        {savingsMonthly.length > 0 && <div style={{flex:"1 1 320px",background:"#fff",borderRadius:14,padding:22,border:"1px solid rgba(0,0,0,0.07)",boxShadow:T.shadow}}>
          <div style={{fontSize:14,fontWeight:600,color:T.heading,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>Monthly Trend</div>
          <SimpleBar data={savingsMonthly} dataKeyX="month" dataKeyY="amount" fill="#2563eb" height={140} showK />
        </div>}
      </div>

      {/* ── Savings Entries with Withdrawal Feature ── */}
      <div style={{background:"#fff",borderRadius:14,border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20,overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>🏦 Savings Entries</div>
          <div style={{fontSize:11,color:T.textMuted}}>Tap any entry to see or record withdrawals</div>
        </div>

        {savings.length === 0 && <div style={{padding:"40px 20px",textAlign:"center",color:T.textMuted}}>
          <div style={{fontSize:40,marginBottom:8}}>🏦</div>
          <div style={{fontSize:14}}>No savings recorded yet. Start building your safety net!</div>
        </div>}

        {[...savings].sort((a,b)=>b.date.localeCompare(a.date)).map((s, idx) => {
          const withdrawn = withdrawnBySavings[s.id] || 0;
          const available = Number(s.amount) - withdrawn;
          const usedPct = Number(s.amount) > 0 ? Math.min((withdrawn / Number(s.amount)) * 100, 100) : 0;
          const isFullyUsed = available <= 0;
          const isPartial = withdrawn > 0 && !isFullyUsed;
          const isExpanded = expandedSavings[s.id];
          const myWithdrawals = savingsWithdrawals.filter(w => w.savingsId === s.id).sort((a,b)=>b.date.localeCompare(a.date));

          // Status badge
          const status = isFullyUsed
            ? {label:"Fully Used",bg:"#fef2f2",color:"#dc2626",dot:"#dc2626"}
            : isPartial
            ? {label:"Partially Used",bg:"#fffbeb",color:"#d97706",dot:"#d97706"}
            : {label:"Available",bg:"#f0fdf4",color:"#059669",dot:"#059669"};

          return (
            <div key={s.id} style={{borderBottom:idx<savings.length-1?`1px solid ${T.border}`:"none"}}>
              {/* Main row */}
              <div
                onClick={()=>setExpandedSavings(p=>({...p,[s.id]:!p[s.id]}))}
                style={{padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:isExpanded?"#fafbff":"#fff",transition:"background 0.15s"}}
              >
                {/* Icon */}
                <div style={{width:40,height:40,borderRadius:11,background:isFullyUsed?"#fef2f2":isPartial?"#fffbeb":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,border:`1px solid ${status.color}20`}}>
                  {isFullyUsed?"📭":isPartial?"📬":"🏦"}
                </div>

                {/* Info */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.heading,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description||s.type}</div>
                    <span style={{fontSize:10,fontWeight:600,color:status.color,background:status.bg,padding:"2px 8px",borderRadius:20,border:`1px solid ${status.color}20`,flexShrink:0}}>{status.label}</span>
                  </div>
                  <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>{s.date} · {s.type}</div>
                  {/* Progress bar */}
                  {withdrawn > 0 && (
                    <div style={{marginTop:6}}>
                      <div style={{height:4,background:"#e2e8f0",borderRadius:2,overflow:"hidden",width:"100%",maxWidth:200}}>
                        <div style={{height:"100%",width:`${usedPct}%`,background:isFullyUsed?"#dc2626":"#d97706",borderRadius:2,transition:"width 0.4s"}} />
                      </div>
                      <div style={{fontSize:9,color:T.textMuted,marginTop:2}}>{fmt(withdrawn)} used of {fmt(Number(s.amount))}</div>
                    </div>
                  )}
                </div>

                {/* Amount + actions */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#2563eb",fontFamily:"'Playfair Display',serif"}}>{fmt(Number(s.amount))}</div>
                  {available > 0 && (
                    <div style={{fontSize:11,color:"#059669",fontWeight:600}}>+{fmt(available)} left</div>
                  )}
                </div>

                {/* Chevron */}
                <span style={{color:T.textMuted,fontSize:16,flexShrink:0,transition:"transform 0.2s",transform:isExpanded?"rotate(90deg)":"none"}}>›</span>
              </div>

              {/* Expanded panel */}
              {isExpanded && (
                <div style={{background:"#f8f9fc",borderTop:`1px solid ${T.border}`,padding:"16px 20px"}}>
                  {/* Action buttons */}
                  <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                    {available > 0 && (
                      <button
                        onClick={e=>{e.stopPropagation();setWithdrawSavingsId(s.id);setModal("withdraw");}}
                        style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:9,background:"linear-gradient(135deg,#d97706,#b45309)",color:"#fff",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(217,119,6,0.3)"}}
                      >
                        💸 Record Withdrawal · {fmt(available)} available
                      </button>
                    )}
                    <button
                      onClick={e=>{e.stopPropagation();setSavings(p=>p.filter(x=>x.id!==s.id));setSavingsWithdrawals(p=>p.filter(w=>w.savingsId!==s.id));}}
                      style={{padding:"8px 14px",borderRadius:9,background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",fontSize:12,fontWeight:500,cursor:"pointer"}}
                    >× Delete</button>
                  </div>

                  {/* Withdrawal history */}
                  {myWithdrawals.length === 0 ? (
                    <div style={{textAlign:"center",padding:"16px 0",color:T.textMuted,fontSize:12}}>
                      <div style={{fontSize:28,marginBottom:4}}>✅</div>
                      This saving has not been spent yet
                    </div>
                  ) : (
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:T.textSec,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Withdrawal History</div>
                      {myWithdrawals.map((w, wi) => (
                        <div key={w.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#fff",borderRadius:10,marginBottom:8,border:"1px solid #fde68a",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                          <div style={{width:32,height:32,borderRadius:8,background:"#fffbeb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>💸</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:600,color:T.heading,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.item}</div>
                            <div style={{fontSize:11,color:T.textMuted}}>{w.date}{w.notes ? " · "+w.notes : ""}</div>
                          </div>
                          <div style={{fontSize:14,fontWeight:700,color:"#d97706",flexShrink:0}}>{fmt(Number(w.amount))}</div>
                          <button onClick={e=>{e.stopPropagation();setSavingsWithdrawals(p=>p.filter(x=>x.id!==w.id));}} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:16,padding:2,flexShrink:0}}>×</button>
                        </div>
                      ))}
                      {/* Summary row */}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:isFullyUsed?"#fef2f2":"#fffbeb",border:`1px solid ${isFullyUsed?"#fecaca":"#fde68a"}`,marginTop:4}}>
                        <span style={{fontSize:12,fontWeight:500,color:isFullyUsed?"#dc2626":"#d97706"}}>{isFullyUsed?"Fully spent":"Remaining"}</span>
                        <span style={{fontSize:14,fontWeight:700,color:isFullyUsed?"#dc2626":"#059669"}}>{isFullyUsed?"—":fmt(available)}</span>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── All Withdrawal History ── */}
      {savingsWithdrawals.length > 0 && (
        <div style={{background:"#fff",borderRadius:14,padding:"20px 22px",border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:T.heading,fontFamily:"'Playfair Display',serif"}}>📜 Complete Withdrawal History</div>
            <span style={{fontSize:11,color:"#d97706",fontWeight:600,background:"#fffbeb",padding:"3px 10px",borderRadius:20,border:"1px solid #fde68a"}}>{fmt(totalWithdrawn)} total used</span>
          </div>
          {[...savingsWithdrawals].sort((a,b)=>b.date.localeCompare(a.date)).map((w,i,arr) => {
            const parentSaving = savings.find(s=>s.id===w.savingsId);
            return (
              <div key={w.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                <div style={{width:36,height:36,borderRadius:10,background:"#fffbeb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,border:"1px solid #fde68a"}}>💸</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.heading}}>{w.item}</div>
                  <div style={{fontSize:11,color:T.textMuted,marginTop:1}}>
                    {w.date}
                    {parentSaving && <span style={{marginLeft:6,color:"#2563eb"}}>← from "{parentSaving.description||parentSaving.type}"</span>}
                    {w.notes && <span style={{marginLeft:6,color:T.textMuted}}>· {w.notes}</span>}
                  </div>
                </div>
                <div style={{fontSize:14,fontWeight:700,color:"#d97706",flexShrink:0}}>{fmt(Number(w.amount))}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Modals */}
      <Modal open={modal==="savings"} onClose={()=>setModal(null)} title="Add Savings"><SavingsForm /></Modal>
      <Modal open={modal==="goal"} onClose={()=>setModal(null)} title="🎯 New Savings Goal"><GoalForm /></Modal>
      <Modal open={modal==="withdraw"} onClose={()=>setModal(null)} title="💸 Record Withdrawal">
        {withdrawSavingsId && <WithdrawForm savingsId={withdrawSavingsId} />}
      </Modal>
      <Modal open={modal==="goal_withdraw"} onClose={()=>setModal(null)} title="💸 Use Goal Savings">
        {withdrawGoalId && <GoalWithdrawForm goalId={withdrawGoalId} />}
      </Modal>
    </div>
    );
  };

  // ── Export Report ──
  const [exportDates, setExportDates] = useState({ from: "", to: today() });
  const [exportSections, setExportSections] = useState({ expenses: true, income: true, savings: true, investments: true, ledger: true });

  const handleExport = async () => {
    const from = exportDates.from;
    const to = exportDates.to;
    if (!from || !to) return;

    const inRange = (d) => d >= from && d <= to;
    const XL = (typeof XLSX !== "undefined") ? XLSX : null;

    if (!XL) {
      // Fallback: CSV export
      const rows = [["Section","Date","Description","Category/Type","Amount","Extra"]];
      if (exportSections.expenses) expenses.filter(e=>inRange(e.date)).forEach(e=>rows.push(["Expense",e.date,e.description,e.category,e.amount,events.find(ev=>ev.id===e.event)?.name||""]));
      if (exportSections.income) incomes.filter(i=>inRange(i.date)).forEach(i=>rows.push(["Income",i.date,i.description,i.source,i.amount,""]));
      if (exportSections.savings) savings.filter(s=>inRange(s.date)).forEach(s=>rows.push(["Savings",s.date,s.description,s.type,s.amount,""]));
      if (exportSections.investments) investments.filter(i=>inRange(i.date)).forEach(i=>rows.push(["Investment",i.date,i.name,i.type,i.amount,i.notes||""]));
      if (exportSections.ledger) ledger.filter(l=>inRange(l.date)).forEach(l=>rows.push([l.type==="payable"?"Payable":"Receivable",l.date,l.description,l.person,l.amount,l.settled?"Settled":"Pending"]));
      const csv = rows.map(r=>r.map(c=>{const s=String(c??"");return s.includes(",")||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s;}).join(",")).join("\n");
      const blob = new Blob([csv],{type:"text/csv"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download=`Kharchay_Report_${from}_to_${to}.csv`; a.click();
      URL.revokeObjectURL(url);
      setModal(null);
      return;
    }

    const wb = XL.utils.book_new();

    if (exportSections.expenses) {
      const data = expenses.filter(e => inRange(e.date)).map(e => ({
        Date: e.date, Description: e.description, Category: e.category, Amount: e.amount,
        Event: events.find(ev => ev.id === e.event)?.name || ""
      }));
      if (data.length) {
        const ws = XL.utils.json_to_sheet(data);
        ws["!cols"] = [{wch:12},{wch:45},{wch:22},{wch:14},{wch:20}];
        XL.utils.book_append_sheet(wb, ws, "Expenses");
      }
    }

    if (exportSections.income) {
      const data = incomes.filter(i => inRange(i.date)).map(i => ({
        Date: i.date, Source: i.source, Description: i.description, Amount: i.amount
      }));
      if (data.length) {
        const ws = XL.utils.json_to_sheet(data);
        ws["!cols"] = [{wch:12},{wch:18},{wch:35},{wch:14}];
        XL.utils.book_append_sheet(wb, ws, "Income");
      }
    }

    if (exportSections.savings) {
      const data = savings.filter(s => inRange(s.date)).map(s => ({
        Date: s.date, Type: s.type, Description: s.description, Amount: s.amount
      }));
      if (data.length) {
        const ws = XL.utils.json_to_sheet(data);
        ws["!cols"] = [{wch:12},{wch:20},{wch:35},{wch:14}];
        XL.utils.book_append_sheet(wb, ws, "Savings");
      }
    }

    if (exportSections.investments) {
      const data = investments.filter(i => inRange(i.date)).map(i => ({
        Date: i.date, Type: i.type, Name: i.name, Amount: i.amount, Notes: i.notes
      }));
      if (data.length) {
        const ws = XL.utils.json_to_sheet(data);
        ws["!cols"] = [{wch:12},{wch:18},{wch:30},{wch:14},{wch:25}];
        XL.utils.book_append_sheet(wb, ws, "Investments");
      }
    }

    if (exportSections.ledger) {
      const data = ledger.filter(l => inRange(l.date)).map(l => ({
        Date: l.date, Type: l.type === "payable" ? "Payable" : "Receivable", Person: l.person,
        Description: l.description, Amount: l.amount, Settled: l.settled ? "Yes" : "No"
      }));
      if (data.length) {
        const ws = XL.utils.json_to_sheet(data);
        ws["!cols"] = [{wch:12},{wch:12},{wch:20},{wch:30},{wch:14},{wch:10}];
        XL.utils.book_append_sheet(wb, ws, "Payable & Receivable");
      }
    }

    // Summary sheet
    const summaryData = [];
    const expInRange = expenses.filter(e => inRange(e.date));
    const incInRange = incomes.filter(i => inRange(i.date));
    const savInRange = savings.filter(s => inRange(s.date));
    const invInRange = investments.filter(i => inRange(i.date));
    summaryData.push({ Metric: "Period", Value: `${from} to ${to}` });
    summaryData.push({ Metric: "Total Income", Value: incInRange.reduce((s,i) => s + Number(i.amount), 0) });
    summaryData.push({ Metric: "Total Expenses", Value: expInRange.reduce((s,e) => s + Number(e.amount), 0) });
    summaryData.push({ Metric: "Total Savings", Value: savInRange.reduce((s,e) => s + Number(e.amount), 0) });
    summaryData.push({ Metric: "Total Investments", Value: invInRange.reduce((s,e) => s + Number(e.amount), 0) });
    summaryData.push({ Metric: "Net (Income - Expenses)", Value: incInRange.reduce((s,i) => s + Number(i.amount), 0) - expInRange.reduce((s,e) => s + Number(e.amount), 0) });
    summaryData.push({ Metric: "Expense Transactions", Value: expInRange.length });
    summaryData.push({ Metric: "Income Transactions", Value: incInRange.length });
    const ws0 = XL.utils.json_to_sheet(summaryData);
    ws0["!cols"] = [{wch:25},{wch:20}];
    XL.utils.book_append_sheet(wb, ws0, "Summary", true);

    if (wb.SheetNames.length === 0) return;
    // Move Summary to front
    const idx = wb.SheetNames.indexOf("Summary");
    if (idx > 0) { wb.SheetNames.splice(idx, 1); wb.SheetNames.unshift("Summary"); }

    XL.writeFile(wb, `Kharchay_Report_${from}_to_${to}.xlsx`);
    setModal(null);
  };

  const ExportModal = () => (

        {[

          { label: "Last Month", fn: () => { const n=new Date(); n.setMonth(n.getMonth()-1); const y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,"0"); const last=new Date(y,n.getMonth()+1,0).getDate(); setExportDates({from:`${y}-${m}-01`,to:`${y}-${m}-${last}`}); }},
          { label: "Last 3 Months", fn: () => { const n=new Date(); n.setMonth(n.getMonth()-3); setExportDates({from:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-01`,to:today()}); }},
          { label: "Last 6 Months", fn: () => { const n=new Date(); n.setMonth(n.getMonth()-6); setExportDates({from:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-01`,to:today()}); }},
          { label: "All Data", fn: () => setExportDates({from:"2020-01-01",to:today()}) },
        ].map(q => (
          <button key={q.label} type="button" onClick={q.fn} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${T.border}`,background:"#fff",fontSize:12,cursor:"pointer",color:T.textSec,fontWeight:500}}>{q.label}</button>
        ))}
      </div>
      {/* Section toggles */}
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:12,color:T.textSec,marginBottom:8,fontWeight:500}}>Include in Export</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {[
            {key:"expenses",label:"📋 Expenses",color:"#dc2626"},
            {key:"income",label:"💰 Income",color:"#059669"},
            {key:"savings",label:"🏦 Savings",color:"#2563eb"},
            {key:"investments",label:"📈 Investments",color:"#7c3aed"},
            {key:"ledger",label:"🤝 Payable/Receivable",color:"#d97706"},
          ].map(s => (
            <button key={s.key} type="button" onClick={()=>setExportSections(p=>({...p,[s.key]:!p[s.key]}))} style={{padding:"8px 14px",borderRadius:10,border:`2px solid ${exportSections[s.key]?s.color:T.border}`,background:exportSections[s.key]?s.color+"10":"#fff",fontSize:12,cursor:"pointer",color:exportSections[s.key]?s.color:T.textSec,fontWeight:exportSections[s.key]?600:400,transition:"all 0.15s"}}>{s.label}</button>
          ))}
        </div>
      </div>
      {/* Preview count */}
      {exportDates.from && exportDates.to && (() => {
        const inR = (d) => d >= exportDates.from && d <= exportDates.to;
        const ec = exportSections.expenses ? expenses.filter(e=>inR(e.date)).length : 0;
        const ic = exportSections.income ? incomes.filter(i=>inR(i.date)).length : 0;
        const sc = exportSections.savings ? savings.filter(s=>inR(s.date)).length : 0;
        const vc = exportSections.investments ? investments.filter(i=>inR(i.date)).length : 0;
        const lc = exportSections.ledger ? ledger.filter(l=>inR(l.date)).length : 0;
        const total = ec+ic+sc+vc+lc;
        return (
          <div style={{background:T.surfaceAlt,borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:12,color:T.textSec}}>
            <span style={{fontWeight:600,color:T.heading}}>{total} records</span> will be exported
            {ec>0&&` · ${ec} expenses`}{ic>0&&` · ${ic} income`}{sc>0&&` · ${sc} savings`}{vc>0&&` · ${vc} investments`}{lc>0&&` · ${lc} ledger`}

      <div style={{display:"flex",gap:10}}>
        <Btn onClick={handleExport} style={{display:"flex",alignItems:"center",gap:6}}>📥 Export to Excel</Btn>
